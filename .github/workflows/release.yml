name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Leer lassen = Version aus package.json (empfohlen für Auto-Update)'
        required: false
        default: ''

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set version from tag, input, or package.json
        shell: pwsh
        run: |
          $evt = '${{ github.event_name }}'
          if ($evt -eq 'workflow_dispatch') {
            $input = '${{ github.event.inputs.version }}'.Trim()
            if ($input -ne '') {
              npm pkg set version=$input
              Write-Host "Building version $input (manual)"
            } else {
              $v = (Get-Content package.json -Raw | ConvertFrom-Json).version
              Write-Host "Building version $v (from package.json)"
            }
          } else {
            $version = '${{ github.ref_name }}' -replace '^v', ''
            npm pkg set version=$version
            Write-Host "Building version $version (from tag)"
          }

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Quality Gate (Lint + QA Harness)
        run: |
          npm run lint
          npm run qa:gate

      - name: Build and Publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build
